<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Background Gradient matching the website -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#edf1fa" />
      <stop offset="0.5" stop-color="#f4f6fb" />
      <stop offset="1" stop-color="#fafbfd" />
    </linearGradient>
    
    <!-- Blur filter for background orbs -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    
    <!-- Soft card shadow -->
    <filter id="card-shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#4f7cff" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Base Grid Canvas -->
  <rect width="32" height="32" rx="9" fill="url(#bg-gradient)" />
  
  <!-- Glowing Orbs (matching website background orbs) -->
  <!-- Blue Orb top-left -->
  <circle cx="6" cy="6" r="10" fill="#4f7cff" opacity="0.22" filter="url(#blur)" />
  <!-- Gold Orb bottom-right -->
  <circle cx="26" cy="26" r="8" fill="#c9920a" opacity="0.18" filter="url(#blur)" />
  <!-- Rose Orb bottom-left -->
  <circle cx="8" cy="26" r="7" fill="#e11d48" opacity="0.12" filter="url(#blur)" />

  <!-- Subtle grid lines (matching site background grid) -->
  <g stroke="rgba(79, 124, 255, 0.05)" stroke-width="0.75">
    <line x1="8" y1="0" x2="8" y2="32" />
    <line x1="16" y1="0" x2="16" y2="32" />
    <line x1="24" y1="0" x2="24" y2="32" />
    <line x1="0" y1="8" x2="32" y2="8" />
    <line x1="0" y1="16" x2="32" y2="16" />
    <line x1="0" y1="24" x2="32" y2="24" />
  </g>

  <!-- Crisp Card (representing standard portfolio UI cards) -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="6.5" fill="#ffffff" stroke="rgba(79, 124, 255, 0.08)" stroke-width="1.2" filter="url(#card-shadow)" />

  <!-- Monogram KS: modern, custom geometric letters matching website logo -->
  <g stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- K in charcoal (#1d1d1f) -->
    <path d="M 9.5 9 V 23 M 15.5 9 L 10 16 L 15.5 23" stroke="#1d1d1f" />
    
    <!-- S in brand blue (#4f7cff) -->
    <path d="M 22.5 10.5 C 22.5 9.5 21.5 9 20 9 C 18.2 9 17 9.8 17 11.2 C 17 13.5 22.5 14 22.5 16.5 C 22.5 19 21.2 23 19.5 23 C 18 23 17 22.2 17 21.2" stroke="#4f7cff" />
  </g>
</svg>
