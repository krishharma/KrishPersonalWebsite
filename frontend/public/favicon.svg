<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Premium dark obsidian background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0c12" />
      <stop offset="1" stop-color="#181b28" />
    </linearGradient>
    <!-- Sleek neon gradient for initials -->
    <linearGradient id="accent" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f2fe" />
      <stop offset="0.5" stop-color="#4f7cff" />
      <stop offset="1" stop-color="#9d4edd" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#4f7cff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark Obsidian Background -->
  <rect width="32" height="32" rx="9" fill="url(#bg)" />
  <rect x="0.5" y="0.5" width="31" height="31" rx="8.5" stroke="rgba(255,255,255,0.08)" />

  <!-- Monogram KS in clean, modern cyber style -->
  <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- K Stem -->
    <path d="M 8.5 8 V 24" />
    <!-- K Diagonals -->
    <path d="M 14.5 8 L 9.5 16 L 14.5 24" />
    <!-- S -->
    <path d="M 23.5 8 H 17.5 V 16 H 23.5 V 24 H 17.5" />
  </g>
</svg>
